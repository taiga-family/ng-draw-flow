<div
    #nodeElement
    data-draw-flow-node
    class="draw-flow-node"
    [attr.data-node-id]="node.id"
    [attr.data-start-node]="node.startNode ? 'true' : null"
    [style.cursor]="cursor"
    (dfDragDrop)="onDrag($event)"
    (dfSelectableElement)="onSelectedChanged($event)"
>
    <div class="node-content">
        <ng-container #container />
    </div>
</div>
