name: ⚠️ Release
on:
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        description: Bump version as requested
        required: true
        options:
          - minor
          - patch
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message , 'chore(release)')"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: taiga-family/ci/actions/setup/variables@cc838cc3dcb2e92a7090a3d9390f8992a6785fe3 # v1.218.0
      - uses: taiga-family/ci/actions/setup/node@cc838cc3dcb2e92a7090a3d9390f8992a6785fe3 # v1.218.0
      - uses: taiga-family/ci/actions/run/release-it@cc838cc3dcb2e92a7090a3d9390f8992a6785fe3 # v1.218.0
        with:
          ref: ${{ github.ref }}
          mode: ${{ github.event.inputs.mode }}
          npmToken: ${{ secrets.NPM_TOKEN }}
          githubToken: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}
