@if (!startNodeSignal()) {
    <df-input
        class="input"
        [connectorData]="{
            nodeId: nodeIdSignal(),
            connectorId: nodeIdSignal() + '-input-1',
            single: false,
        }"
    />
}

<strong>{{ modelSignal().text }}</strong>
<span>{{ startNodeSignal() ? 'Drag the orange output' : 'Drop the edge here' }}</span>

@if (!endNodeSignal()) {
    <df-output
        class="output"
        [connectorData]="{
            nodeId: nodeIdSignal(),
            connectorId: nodeIdSignal() + '-output-1',
            single: false,
        }"
    />
}
