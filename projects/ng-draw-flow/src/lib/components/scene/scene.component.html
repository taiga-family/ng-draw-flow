@for (node of model.nodes; track trackByNodeId($index, node)) {
    <df-node
        [invalid]="$invalidNodes().includes(node.id)"
        [node]="node"
        (connectorDeleted)="onConnectorDeleted($event)"
        (nodeDeleted)="onNodeDeleted(node.id)"
        (nodeMoved)="onNodeMoved($event)"
        (nodeSelected)="onNodeSelected($event)"
    />
}

@for (connection of model.connections; track trackByConnectionsFn($index, connection)) {
    <df-connection
        [connection]="connection"
        (connectionDeleted)="onConnectionDeleted(connection)"
        (connectionSelected)="onConnectionSelected(connection)"
    />
}

@if (isConnectionCreating$ | async) {
    <df-draft-connection (connectionCreated)="onConnectionCreated($event)" />
}
